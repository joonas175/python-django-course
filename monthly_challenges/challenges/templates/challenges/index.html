{% extends "layout.html" %}
{% load static %}

{% block title %}All Challenges{% endblock title %}

{% block style %}
    <link rel="stylesheet" href="{% static "challenges/challenges.css" %}">
{% endblock style %}

{% block content %}
    <h1>All Challenges</h1>
    <ul>
        {% for month in months %}
            <li><a href="{% url 'month-challenge' month %}">{{ month|capfirst }}</a></li>
        {% endfor %}
    </ul>
{% endblock content %}
