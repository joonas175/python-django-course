<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Challenge</title>
</head>

<body>
    {% if challenge and month %}
        <h1>Challenge for {{ month|capfirst }}</h1>
        <h2>{{ challenge }}</h2>
    {% else %}
        <h1>No challenge available</h1>
    {% endif %}
</body>

</html>
