{% extends "base.html" %}
{% load static %}

{% block title %}All posts{% endblock title %}

{% block styles %}
    <link rel="stylesheet" href="{% static 'blog/posts.css' %}">
{% endblock styles %}

{% block content %}
<section id="all-posts">
    <h2>Kaikki Postaukset</h2>
    <ul>
        {% for post in posts %}
            {% include "blog/includes/post.html" with post=post %}
        {% endfor %}
    </ul>
</section>
{% endblock content %}
